<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#07101c">
  <title>ATLAS – Offline</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
      background:linear-gradient(180deg,#0c1b2d,#050912);
      color:#fff7e8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    }
    .card{
      width:min(460px,100%);text-align:center;padding:28px;
      background:#17263b;border:1px solid #37506f;border-radius:22px;
    }
    .logo{
      width:68px;height:68px;margin:0 auto 16px;border-radius:50%;
      border:1px solid #d9bd6a;display:grid;place-items:center;
      color:#d9bd6a;font-family:Georgia,serif;font-size:38px;
    }
    h1{font-size:26px;margin:0 0 10px}
    p{color:#dbe7fa;line-height:1.5;margin:0}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">A</div>
    <h1>ATLAS ist gerade offline</h1>
    <p>Für Cloud-Daten und Live-Kurse wird eine Internetverbindung benötigt. Öffne ATLAS erneut, sobald die Verbindung wieder verfügbar ist.</p>
  </div>
</body>
</html>
